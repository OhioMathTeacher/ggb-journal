<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archives — North American GeoGebra Journal</title>
    <style>
    .search-row {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .search-row input {
      flex: 1; min-width: 220px;
      padding: 0.55rem 0.85rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      border: 1.5px solid var(--gray-200);
      border-radius: 6px;
      outline: none;
      color: var(--ink);
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-row input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,176,0.1); }
    .result-count { font-size: 0.8rem; color: var(--gray-400); white-space: nowrap; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
</head>
<body>

<div id="hdr"></div>

<div class="page-container">
  <div class="two-col">
    <main>
      <span class="eyebrow">Complete Publication Record</span>
      <h1 class="page-title">Archives</h1>
      <p class="page-lead" id="archive-lead"></p>

      <div class="search-row">
        <input type="text" id="q" placeholder="Search by title, author…" autocomplete="off" />
        <span class="result-count" id="rc"></span>
      </div>

      <div id="archive-body"></div>
    </main>

    <aside class="sidebar" id="sidebar"></aside>
  </div>
</div>

<div id="ftr"></div>

<script src="articles.js"></script>
<script src="shared.js"></script>
<script>
  document.getElementById('hdr').innerHTML = renderHeader('archives');
  document.getElementById('ftr').innerHTML = renderFooter();

  const j = NAGJ_DATA.journal;
  const total = NAGJ_DATA.issues.reduce((s, i) => s + i.articles.length, 0);

  document.getElementById('archive-lead').textContent =
    `${total} articles across ${NAGJ_DATA.issues.length} issues, 2012–present. PDFs currently link to the legacy OJS server; local copies are added as files are uploaded.`;

  // Build sidebar
  const localCount = NAGJ_DATA.issues.reduce((s,i) => s + i.articles.filter(a=>a.localPdf).length, 0);
  document.getElementById('sidebar').innerHTML = `
    <div class="card">
      <div class="card-title">Quick Stats</div>
      <div class="stat-row">
        <div class="stat-box"><span class="stat-val">${NAGJ_DATA.issues.length}</span><span class="stat-lbl">Issues</span></div>
        <div class="stat-box"><span class="stat-val">${total}</span><span class="stat-lbl">Articles</span></div>
        <div class="stat-box"><span class="stat-val">${localCount}</span><span class="stat-lbl">Local PDFs</span></div>
        <div class="stat-box"><span class="stat-val">${j.founded}</span><span class="stat-lbl">Founded</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Jump to Issue</div>
      <ul>${NAGJ_DATA.issues.map(i =>
        `<li><a href="#${i.id}">Vol. ${i.volume} No. ${i.number} (${i.year})</a></li>`
      ).join('')}</ul>
    </div>
    <div class="card">
      <div class="card-title">PDF Migration</div>
      <p>${localCount} of ${total} articles have local PDFs. <a href="admin.html">Use the admin tool</a> to track and update.</p>
      <a href="admin.html" class="btn primary">Open Admin ↗</a>
    </div>`;

  // Build archive
  document.getElementById('archive-body').innerHTML = NAGJ_DATA.issues.map(issue => {
    const tag = issue.isProceedings
      ? `<span class="volume-tag proc">Proceedings</span>`
      : `<span class="volume-tag">Vol. ${issue.volume} · No. ${issue.number}</span>`;
    const fullIssue = issue.fullIssuePdf
      ? `<p style="font-size:0.78rem; margin-bottom:0.5rem; color:var(--gray-400);">
           Full issue: <a href="${issue.fullIssuePdf}" target="_blank">Download PDF ↗</a></p>`
      : '';
    const articles = issue.articles.map(renderArticleRow).join('');
    return `
<section class="volume-section" id="${issue.id}">
  <div class="volume-heading">
    ${tag}
    <span class="volume-title-text">${issue.title}</span>
    <span class="volume-year-tag">${issue.year}</span>
  </div>
  ${issue.subtitle && !issue.isProceedings ? `<p style="font-size:0.82rem;color:var(--gray-400);font-style:italic;margin-bottom:0.5rem;">${issue.subtitle}</p>` : ''}
  ${fullIssue}
  <ul class="article-list">${articles}</ul>
</section>`;
  }).join('');

  document.getElementById('rc').textContent = `${total} articles`;

  // Search
  document.getElementById('q').addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    let shown = 0;
    document.querySelectorAll('.article-row').forEach(row => {
      const match = !q || row.dataset.search.includes(q);
      row.classList.toggle('hidden', !match);
      if (match) shown++;
    });
    document.querySelectorAll('.volume-section').forEach(sec => {
      const vis = sec.querySelectorAll('.article-row:not(.hidden)').length;
      sec.classList.toggle('hidden', q && vis === 0);
    });
    document.getElementById('rc').textContent = q ? `${shown} result${shown !== 1 ? 's' : ''}` : `${total} articles`;
  });
</script>
</body>
</html>
